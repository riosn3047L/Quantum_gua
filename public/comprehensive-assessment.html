</nav>

<span class="text-[10px] font-label font-bold text-on-surface-variant uppercase tracking-widest">Global Progress</span>
<span id="globalPct" class="text-xs font-mono text-primary-fixed-dim">0%</span>
</div>

</div>

</div>

                    SUBMIT FULL ASSESSMENT
                 </button>

                </div>
<div class="flex gap-8">
<a class="font-mono text-xs tracking-widest uppercase text-[#D6E3FF]/40 hover:text-[#A8E8FF] transition-colors" href="#">Privacy Policy</a>
<a class="font-mono text-xs tracking-widest uppercase text-[#D6E3FF]/40 hover:text-[#A8E8FF] transition-colors" href="#">Terms of Service</a>

</div>

</div>

<script>
(function() {
  const questions = QG.QUESTIONS;
  const practices = QG.PRACTICES;
  const dimensions = QG.DIMENSIONS;
  const answers = Engine.getAnswers('comprehensive') || {};
  const dimColors = { CVI: '#00D4FF', SGRM: '#D2BBFF', DPE: '#FFD9A1', ITR: '#FF8A65' };
  const dimIcons = { CVI: 'security', SGRM: 'shield', DPE: 'hub', ITR: 'policy' };

  let currentPracticeIdx = 0;

  // ── Build Sidebar ──
  function buildSidebar() {
    const nav = document.getElementById('sidebarNav');
    nav.innerHTML = '';
    dimensions.forEach(dim => {
      const dimPractices = practices.filter(p => p.dimension === dim.id);
      const dimQs = questions.filter(q => q.dimension === dim.id);
      const dimAnswered = dimQs.filter(q => answers[q.id] > 0).length;
      const isActive = practices[currentPracticeIdx].dimension === dim.id;

      let html = `<div class="space-y-1">
        <button class="w-full flex items-center justify-between p-2 rounded-lg ${isActive ? 'bg-surface-container-highest/40' : 'hover:bg-surface-container-highest/40'} transition-all" style="color: ${isActive ? dim.color : '#bbc9cf'}; font-weight: ${isActive ? 'bold' : 'normal'}">
          <span class="flex items-center gap-2">
            <span class="material-symbols-outlined text-sm" ${isActive ? 'style="font-variation-settings: \'FILL\' 1;"' : ''}>${dimIcons[dim.id]}</span>
            ${dim.name.split('(')[0].trim()}
          </span>
          <span class="text-[10px] font-mono px-2 py-0.5 rounded-full" style="background: ${dim.color}20">${dimAnswered}/${dimQs.length}</span>
        </button>
        <div class="ml-4 pl-4 border-l border-outline-variant/20 space-y-2 py-2">`;

      dimPractices.forEach((p, pIdx) => {
        const practiceIdx = practices.indexOf(p);
        const pQs = questions.filter(q => q.practice === p.id);
        const pAnswered = pQs.filter(q => answers[q.id] > 0).length;
        const isCurrent = practiceIdx === currentPracticeIdx;
        const isDone = pAnswered === pQs.length && pQs.length > 0;

        html += `<a class="flex items-center justify-between text-xs cursor-pointer ${isCurrent ? 'text-primary font-bold' : 'text-on-surface-variant hover:text-on-surface'} transition-colors group" data-practice-idx="${practiceIdx}">
          <span class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[14px]">${isDone ? 'check_circle' : isCurrent ? 'radio_button_checked' : 'radio_button_unchecked'}</span>
            ${p.id} ${p.name.split('&')[0].trim().substring(0, 25)}${p.name.length > 25 ? '…' : ''}
          </span>
          <span class="text-[9px] font-mono ${isDone ? 'text-primary' : 'text-on-surface-variant/50'}">${pAnswered}/${pQs.length}</span>
        </a>`;
      });

      html += `</div></div>`;
      nav.insertAdjacentHTML('beforeend', html);
    });

    // Click handlers
    nav.querySelectorAll('[data-practice-idx]').forEach(a => {
      a.addEventListener('click', () => {
        currentPracticeIdx = parseInt(a.dataset.practiceIdx);
        renderAll();
      });
    });
  }

  // ── Build Dimension Progress ──
  function buildDimProgress() {
    const container = document.getElementById('dimProgress');
    container.innerHTML = '';
    dimensions.forEach(dim => {
      const dimQs = questions.filter(q => q.dimension === dim.id);
      const dimAnswered = dimQs.filter(q => answers[q.id] > 0).length;
      const pct = dimQs.length > 0 ? Math.round((dimAnswered / dimQs.length) * 100) : 0;
      container.innerHTML += `
        <div class="bg-surface-container-high/40 p-4 rounded-xl border border-outline-variant/10">
          <p class="text-[10px] font-label font-bold uppercase mb-2" style="color: ${dim.color}">${dim.id}</p>
          <div class="flex items-center gap-3">
            <div class="flex-1 h-1 bg-outline-variant/20 rounded-full overflow-hidden">
              <div class="h-full transition-all duration-500" style="width: ${pct}%; background: ${dim.color}"></div>
            </div>
            <span class="text-[10px] font-mono" style="color: ${pct > 0 ? dim.color : '#bbc9cf'}">${pct}%</span>
          </div>
        </div>`;
    });
  }

  // ── Render Questions ──
  function renderQuestions() {
    const practice = practices[currentPracticeIdx];
    const dim = dimensions.find(d => d.id === practice.dimension);
    const practiceQs = questions.filter(q => q.practice === practice.id);

    document.getElementById('practiceTitle').textContent = `Practice ${practice.id}: ${practice.name}`;
    document.getElementById('practiceDesc').textContent = dim.description;

    const container = document.getElementById('questionsContainer');
    container.innerHTML = '';

    practiceQs.forEach((q, idx) => {
      const saved = answers[q.id] || 0;
      let optHtml = '';
      q.options.forEach((opt, oi) => {
        const isChecked = saved === opt.score;
        optHtml += `
          <label class="flex items-center gap-4 p-4 rounded-xl border ${isChecked ? 'border-primary-container/40 bg-primary-container/5' : 'border-outline-variant/20 bg-surface-container-lowest/40 hover:bg-surface-container-highest/60'} cursor-pointer transition-all">
            <input ${isChecked ? 'checked' : ''} class="w-4 h-4 text-primary bg-surface border-outline-variant focus:ring-primary" name="cq_${q.id}" type="radio" value="${opt.score}" data-qid="${q.id}">
            <div class="flex flex-col">
              <span class="text-[10px] font-label uppercase tracking-wider mb-0.5" style="color: ${dim.color}80">${opt.label}</span>
              <span class="font-label text-sm font-medium ${isChecked ? 'text-on-surface' : 'text-on-surface-variant'}">${opt.text}</span>
            </div>
          </label>`;
      });

      container.innerHTML += `
        <div class="bg-surface-container-high/60 backdrop-blur-md rounded-2xl p-8 border border-outline-variant/15 relative overflow-hidden group q-fade">
          <div class="absolute top-0 left-0 w-1 h-full transition-colors" style="background: ${saved > 0 ? dim.color : '#3c494e33'}"></div>
          <div class="flex flex-col md:flex-row gap-8">
            <div class="shrink-0">
              <span class="w-12 h-12 flex items-center justify-center rounded-xl border font-mono font-bold text-xl ${saved > 0 ? 'bg-primary-container/10 border-primary-container/20' : 'bg-surface-container-lowest border-outline-variant/20 text-on-surface-variant'}" style="${saved > 0 ? 'color:' + dim.color : ''}">${String(idx + 1).padStart(2, '0')}</span>
            </div>
            <div class="flex-1">
              <h3 class="text-xl font-bold mb-6 text-on-surface leading-snug">${q.question}</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">${optHtml}</div>
            </div>
          </div>
        </div>`;
    });

    // Attach radio change listeners
    container.querySelectorAll('input[type="radio"]').forEach(radio => {
      radio.addEventListener('change', function() {
        const qid = parseInt(this.dataset.qid);
        answers[qid] = parseInt(this.value);
        Engine.saveAnswers(answers, 'comprehensive');
        updateProgress();
        buildSidebar();
      });
    });

    // Update pagination
    document.getElementById('pageInfo').textContent = `Practice ${currentPracticeIdx + 1} of ${practices.length}`;
    const dots = document.getElementById('pageDots');
    dots.innerHTML = practices.map((_, i) => `<div class="w-8 h-1 rounded-full ${i === currentPracticeIdx ? 'bg-primary' : i < currentPracticeIdx ? 'bg-primary/40' : 'bg-outline-variant/30'}"></div>`).join('');

    // Next/Prev labels
    document.getElementById('prevPractice').disabled = currentPracticeIdx === 0;
    document.getElementById('prevPractice').style.opacity = currentPracticeIdx === 0 ? '0.3' : '1';
    const nextP = practices[currentPracticeIdx + 1];
    document.getElementById('nextPractice').textContent = nextP ? `Next: ${nextP.name.substring(0, 30)}…` : 'View Results';
  }

  function updateProgress() {
    const total = questions.length;
    const answered = Object.keys(answers).filter(k => answers[k] > 0).length;
    const pct = Math.round((answered / total) * 100);
    document.getElementById('globalPct').textContent = pct + '%';
    document.getElementById('globalBar').style.width = pct + '%';
    buildDimProgress();
  }

  function renderAll() {
    buildSidebar();
    buildDimProgress();
    renderQuestions();
    updateProgress();
    document.querySelector('main').scrollTo(0, 0);
  }

  // Navigation
  document.getElementById('prevPractice').addEventListener('click', () => {
    if (currentPracticeIdx > 0) { currentPracticeIdx--; renderAll(); }
  });
  document.getElementById('nextPractice').addEventListener('click', () => {
    if (currentPracticeIdx < practices.length - 1) { currentPracticeIdx++; renderAll(); }
    else { window.location.href = 'results.html?source=comprehensive'; }
  });
  document.getElementById('submitBtn').addEventListener('click', () => {
    if (currentPracticeIdx < practices.length - 1) { currentPracticeIdx++; renderAll(); }
    else { window.location.href = 'results.html?source=comprehensive'; }
  });
  document.getElementById('saveBtn').addEventListener('click', () => {
    Engine.saveAnswers(answers, 'comprehensive');
    alert('Progress saved! You can resume later.');
  });
  document.getElementById('submitAll').addEventListener('click', () => {
    Engine.saveAnswers(answers, 'comprehensive');
    window.location.href = 'results.html?source=comprehensive';
  });

  // Initial render
  renderAll();
})();
</script>
<script src="ui-utils.js"></script>
</body></html>
